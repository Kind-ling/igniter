[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kindling-igniter"
version = "0.1.0"
description = "x402 + MCP + A2A scaffolding for FastAPI — agent payment gating made simple"
license = { text = "MIT" }
authors = [{ name = "Permanent Upper Class" }]
requires-python = ">=3.10"
dependencies = ["fastapi>=0.100.0", "httpx>=0.24.0"]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21", "httpx>=0.24.0"]

[project.urls]
Homepage = "https://github.com/Kind-ling/igniter"

[tool.hatch.build.targets.wheel]
packages = ["kindling_igniter"]
